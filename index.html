<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" placeholder="0" id="inputBox">
        
        <!-- Normal Row -->
        <div>
            <button class="operator">AC</button>
            <button class="operator">DEL</button>
            <button class="operator">%</button>
            <button class="operator">/</button>
        </div>
        
        <!-- Scientific Row -->
        <div>
            <button class="sci">sin</button>
            <button class="sci">cos</button>
            <button class="sci">tan</button>
            <button class="sci">log</button>
        </div>
        <div>
            <button class="sci">√</button>
            <button class="sci">x²</button>
            <button class="sci">π</button>
            <button class="sci">e</button>
        </div>

        <!-- Numbers -->
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">-</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">*</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>
        <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="equal1BTn">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
